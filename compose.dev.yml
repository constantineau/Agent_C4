# Agent_C4 development stack. Separate DB + ports from prod; safe to tear down.
#   docker compose -f compose.dev.yml up -d --build
name: sr33-dev

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sr33}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sr33-dev}
      POSTGRES_DB: ${POSTGRES_DB:-sr33_dev}
    ports:
      - "5433:5432"
    volumes:
      - sr33_dev_pgdata:/var/lib/postgresql/data
      # migrations in this dir run in filename order on first init
      - ./vps/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sr33} -d ${POSTGRES_DB:-sr33_dev}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  ingestion:
    build:
      context: .
      dockerfile: vps/ingestion/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://sr33:sr33-dev@timescaledb:5432/sr33_dev}
      INGEST_TOKEN: ${INGEST_TOKEN:-dev-ingest-token}
    ports:
      - "8101:8000"
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: unless-stopped

  agent:
    build:
      context: .
      dockerfile: vps/agent/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://sr33:sr33-dev@timescaledb:5432/sr33_dev}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-opus-4-8}
      BOAT_ID: ${BOAT_ID:-sr33}
      BOAT_PASSWORD: ${BOAT_PASSWORD:-sr33-dev}   # shared-password web auth (Phase 7)
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
      RACE_MODE_DEFAULT: ${RACE_MODE_DEFAULT:-practice}   # 9.2 gate: dev opens; prod omits -> fail-closed 'race'
    ports:
      - "8102:8000"
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: vps/web/Dockerfile
    environment:
      # nginx templates these into the served config
      AGENT_HOST: agent
      AGENT_PORT: "8000"
    ports:
      - "8090:80"
    depends_on:
      - agent
    restart: unless-stopped

  # C4 Performance Lab (cloud) — the browser-based prep/debrief surface. Serves the Lab web
  # shell + the race-library API from one container. No DB dependency yet (race definitions are
  # JSON artifacts: bundled in the image + ingested ones on the lab_ingested volume).
  lab:
    build:
      context: .
      dockerfile: vps/lab/Dockerfile
    environment:
      LAB_PASSWORD: ${LAB_PASSWORD:-lab-dev}
      LAB_AUTH_ENABLED: ${LAB_AUTH_ENABLED:-true}
      AGENT_URL: ${AGENT_URL:-http://agent:8000}        # Monitor: our-boat telemetry from the cloud agent
      BOAT_PASSWORD: ${BOAT_PASSWORD:-sr33-dev}          # to auth to the agent for /conditions
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}        # race-doc ingestion (Opus extraction)
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-opus-4-8}
      COASTLINE_CACHE: /srv/coastline       # Lab obstacle avoidance: cached coastline polygons
      COASTLINE_SOURCE: ${COASTLINE_SOURCE:-natural_earth}  # natural_earth | enc (NOAA S-57, draft-aware)
      COASTLINE_GLOBAL: ${COASTLINE_GLOBAL:-gshhg}  # global backstop dataset: gshhg (full-res) | natural_earth
      GSHHG_RES: ${GSHHG_RES:-f}            # GSHHG resolution f(ull)|h|i|l|c — full = all sub-nm islands
      ENC_CACHE: /srv/enc                   # NOAA ENC cells + extracted GeoJSON (prep-time GDAL)
      PLAYBOOK_DIR: /srv/playbooks          # Lab-2b: frozen, signed playbook bundles (onboard homework)
      LEARNING_DB: /srv/learning/learning.db  # Lab-4: ongoing performance archive + refinement proposals
      BOAT_DRAFT_M: ${BOAT_DRAFT_M:-2.1336}  # active boat draft (m); SR33 = 7 ft → ENC depth no-go
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}        # feedback widget → GitHub issues (dedicated fine-grained PAT)
      GITHUB_REPO: ${GITHUB_REPO:-constantineau/Agent_C4}
      FEEDBACK_ALLOW_ORIGINS: ${FEEDBACK_ALLOW_ORIGINS:-https://c4.racertracer.net,https://lab.racertracer.net,http://localhost:8091}
    ports:
      - "8103:8000"
    volumes:
      - lab_ingested:/srv/ingested
      - lab_gribcache:/srv/gribcache        # Lab-1: cached GRIB subsets (cheap re-runs/members)
      - lab_coastline:/srv/coastline        # land/lake polygons for obstacle avoidance (fetched once)
      - lab_enc:/srv/enc                    # NOAA ENC S-57 cells + extracted GeoJSON (cached)
      - lab_playbooks:/srv/playbooks        # Lab-2b: frozen signed playbook bundles
      - lab_learning:/srv/learning          # Lab-4: ongoing performance archive (SQLite)
    restart: unless-stopped

volumes:
  sr33_dev_pgdata:
  lab_ingested:
  lab_gribcache:
  lab_coastline:
  lab_enc:
  lab_playbooks:
  lab_learning:
