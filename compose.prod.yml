# Agent_C4 production stack. Managed/auto-restart — leave alone except to deploy.
# Separate DB (sr33_prod) and ports from dev so dev work can never corrupt the archive.
# TLS/nginx termination + real ports are wired up in Phase 7; this is the skeleton.
name: sr33-prod

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sr33}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in prod .env}
      POSTGRES_DB: ${POSTGRES_DB:-sr33_prod}
    volumes:
      - sr33_prod_pgdata:/var/lib/postgresql/data
      - ./vps/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sr33} -d ${POSTGRES_DB:-sr33_prod}"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: always

  ingestion:
    build:
      context: .
      dockerfile: vps/ingestion/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:?set in prod .env}
      INGEST_TOKEN: ${INGEST_TOKEN:?set in prod .env}
    expose:
      - "8000"
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: always

  agent:
    build:
      context: .
      dockerfile: vps/agent/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:?set in prod .env}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?set in prod .env}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-opus-4-8}
      BOAT_ID: ${BOAT_ID:-sr33}
      BOAT_PASSWORD: ${BOAT_PASSWORD:?set in prod .env}   # shared crew web password
      AUTH_SECRET: ${AUTH_SECRET:?set in prod .env}       # token signing secret (fresh, random)
      AUTH_TTL_HOURS: ${AUTH_TTL_HOURS:-720}
    expose:
      - "8000"
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: always

  web:
    build:
      context: .
      dockerfile: vps/web/Dockerfile
    environment:
      AGENT_HOST: agent
      AGENT_PORT: "8000"
      SERVER_NAME: ${SERVER_NAME:?set in prod .env}   # the public domain (TLS cert CN)
      TLS_ENABLED: ${TLS_ENABLED:-true}               # HTTP-only until certbot has issued, then HTTPS
    # Terminates TLS for the crew. NOTE: ports 80/443 must be free on the host (this box also
    # runs DreamCRM / racertracer — check before deploy; front with a shared proxy if taken).
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - letsencrypt:/etc/letsencrypt:ro       # certs (written by the certbot service)
      - certbot_webroot:/var/www/certbot:ro   # ACME http-01 challenge docroot
    depends_on:
      - agent
    restart: always

  # Let's Encrypt issuance/renewal (webroot mode). Issue once via deploy/init_tls.sh; this
  # long-running form renews every 12h. Shares the cert + webroot volumes with web.
  certbot:
    image: certbot/certbot:latest
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: /bin/sh
    command: -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'
    restart: always

volumes:
  sr33_prod_pgdata:
  letsencrypt:
  certbot_webroot:
