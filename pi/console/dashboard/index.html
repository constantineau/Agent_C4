<!doctype html>
<html lang="en" data-theme="day">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>SR33 Crew Dashboard</title>
  <link rel="stylesheet" href="dashboard.css?v=day0716">
</head>
<body>
  <!-- ===== top bar ===== -->
  <header class="topbar">
    <h1>SR33 CREW</h1>
    <span class="badge onboard">ONBOARD</span>
    <span class="spacer"></span>

    <!-- RACE LOG: the owner's record switch — one tap starts a session (kept + backfilled +
         debriefed); data outside sessions is pruned and never leaves the boat. No Lab prep needed. -->
    <button class="ctl rec" id="recBtn" title="Race log — tap to start/end a logged session (races AND practice sails; day sails/deliveries outside a session are pruned and never leave the boat)">⏺ <b id="recLbl">LOG</b></button>
    <!-- data source: LIVE engine vs canned DEMO scenarios (calm/escalated) -->
    <button class="ctl" id="srcBtn" title="Live engine ↔ demo scenarios">SRC: <b id="srcLbl">LIVE</b></button>
    <button class="ctl" id="themeBtn" title="Day / night theme">☀ <b id="themeLbl">AUTO</b></button>
    <!-- audio ALERT: a short attention tone (no speech) on a new safety/urgent callout; tap to arm + test
         (also satisfies iOS Safari's audio-unlock gesture) -->
    <button class="ctl" id="alertBtn" title="Sound a short alert tone when a safety callout appears — tap to enable / test">🔔 <b id="alertLbl">OFF</b></button>
  </header>

  <!-- ===== Sails bar: the crew-set sail CONFIGURATION (a set — C0 alone, C0+J2, kite+staysail…)
       + main reef. Always available in live mode (no playbook / no course needed) — every change
       is logged onboard with a timestamp for the race log / debrief. ===== -->
  <section class="sailsbar" id="sailsBar" hidden aria-label="Current sails">
    <span class="sb-tag">CURRENT SAILS</span>
    <span id="sbChips"></span>
    <span class="sb-sep"></span>
    <span class="sb-tag" title="Main reef — tuck in / shake out reef 1">MAIN</span>
    <span id="sbReef"></span>
    <span class="sb-sep"></span>
    <span class="sb-tag" title="Declare blown/damaged gear — no instrument can see a blown sail; this tap is the signal that arms the gear-loss plays and excludes the sail from re-routes">OUT✕</span>
    <span id="sbGear"></span>
    <span class="sb-note" id="sbNote"></span>
  </section>

  <!-- ===== Race checklist bar: ACTIVE SI/NOR requirement reminders (the engine /checklist
       triggers — nav lights at sunset, the Cove Island gate photo, the finish procedure).
       Appears only when something needs doing; ✓ acks it (engine-persisted). Tap the tag or an
       item's text for the full race checklist. ===== -->
  <section class="chkbar" id="chkBar" hidden aria-label="Race checklist">
    <span class="sb-tag chk-tag" id="chkTag">☑ CHECKLIST</span>
    <span id="chkItems"></span>
  </section>

  <!-- ===== main: fixed tile grid + commentary ===== -->
  <main class="dash">
    <section class="grid" id="grid" aria-label="Status tiles"><!-- tiles injected by JS --></section>

    <aside class="commentary" id="commentary" aria-label="Copilot commentary">
      <div class="comm-head">
        <span class="comm-title">COPILOT</span>
        <span class="mode-pill" id="modePill"><span class="mdot"></span><b id="modeLbl">llm-live</b></span>
      </div>
      <!-- proactive auto-coach: the latest thing the copilot volunteered (driven by the on-Orin timer).
           No label — the accent highlight marks it as the volunteered alert; it shares the COPILOT panel. -->
      <div class="coach-line" id="coachLine" hidden>
        <span class="coach-say" id="coachSay"></span>
        <span class="coach-when" id="coachWhen"></span>
      </div>
      <p class="comm-focus" id="commFocus">—</p>
      <ul class="comm-notes" id="commNotes"></ul>
      <div class="comm-foot">
        <span class="conf" id="commConf">conf: —</span>
        <button class="briefme" id="briefBtn">Brief me ↻</button>
      </div>
    </aside>
  </main>

  <!-- ===== tap-a-tile detail slide-over ===== -->
  <div class="overlay" id="overlay" hidden></div>
  <section class="detail" id="detail" hidden aria-modal="true" role="dialog">
    <header class="det-head">
      <button class="det-back" id="detBack" aria-label="Back to grid">‹ back</button>
      <span class="det-name" id="detName">—</span>
      <span class="det-status" id="detStatus"></span>
    </header>

    <div class="det-gauge" id="detGauge"></div>

    <div class="det-body">
      <div class="slot">
        <span class="slot-lbl">WHY</span>
        <p class="slot-txt" id="detWhy"></p>
      </div>
      <div class="slot">
        <span class="slot-lbl">CONSIDER</span>
        <p class="slot-txt" id="detConsider"></p>
      </div>
      <div class="slot">
        <span class="slot-lbl">CLEARS WHEN</span>
        <p class="slot-txt" id="detClears"></p>
      </div>
      <div class="slot">
        <span class="slot-lbl">BASED ON</span>
        <p class="slot-txt based" id="detBased"></p>
      </div>
    </div>

    <footer class="det-foot">
      <input class="det-ask" id="detAsk" placeholder="Ask about this…" />
      <button class="det-send" id="detSend" aria-label="Ask">↵</button>
    </footer>
  </section>

  <script src="/sun.js"></script>
  <script src="dashboard.js?v=map0718b"></script>
</body>
</html>
