<!DOCTYPE html>
<html lang="en" data-theme="day">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>SR33 Navigator</title>
<link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <!-- shared-password gate: POSTs to /api/auth for a server-issued bearer token (Phase 7) -->
  <div id="gate">
    <h1 style="letter-spacing:2px;">SR33 NAVIGATOR</h1>
    <input id="pw" type="password" placeholder="Boat password" autocomplete="current-password"
           onkeydown="if(event.key==='Enter')unlock()" />
    <button onclick="unlock()">Enter</button>
    <div class="err" id="gateErr"></div>
    <div class="hint">One shared boat password for the crew. Designed for an iPad at the
      nav station — landscape.</div>
  </div>

  <!-- top bar -->
  <div class="topbar">
    <h1>SR33&nbsp;NAVIGATOR</h1>
    <span class="dot" id="link" title="telemetry link"></span>
    <span class="spacer"></span>

    <div class="pill" id="fatigueChip" data-level="" onclick="ask('How is the driver doing — should we rotate the helm?')"
         title="Helm fatigue index — tap to ask">
      <span>HELM</span><span class="fval" id="fatigueVal">–</span>
    </div>
    <button class="pill toggle" id="modeBtn" onclick="toggleMode()" title="Race mode gates tactical/routing advice (RRS 41)">
      <span id="modeLbl">PRACTICE</span>
    </button>
    <button class="pill toggle" id="themeBtn" onclick="cycleTheme()" title="Day / night / auto">
      <span id="themeLbl">AUTO</span>
    </button>
    <button class="pill" onclick="openChannels()" title="All channels">CHANNELS</button>
  </div>

  <!-- alert banner (server-pushed over /ws; severity-colored, dismissible; day/night aware) -->
  <div id="alerts" class="alerts"></div>

  <!-- main stage -->
  <div class="stage">
    <div class="main">
      <div class="card grow" id="plotCard">
        <div class="cardhead">
          <h2>Course — <span id="routeName">default</span></h2>
          <div class="plottools">
            <button class="minibtn" id="orientBtn" onclick="Plot.toggleOrient()">N↑</button>
            <button class="minibtn" id="routeBtn" onclick="Plot.toggleRoute()">Route</button>
            <button class="minibtn" onclick="Plot.dropPractice()">Drop practice course</button>
          </div>
        </div>
        <canvas id="coursePlot" class="courseplot"></canvas>
      </div>
    </div>

    <div class="rail">
      <div class="card" id="sailCard">
        <h2>Sail range</h2>
        <canvas id="sailDial" class="saildial"></canvas>
        <div class="sailrec" id="sailRec">Waiting for true wind…</div>
        <div class="sailsel" id="sailSel">
          <span class="sellbl">Up:</span>
          <button data-sail="J1">J1</button>
          <button data-sail="A2">A2</button>
          <button data-sail="A3">A3</button>
          <button data-sail="S2">S2</button>
          <button data-sail="">—</button>
        </div>
      </div>
      <div class="card" id="navCard">
        <h2>Navigator</h2>
        <div id="navBody" class="navbody">
          <div class="placeholder" style="min-height:80px;">No course loaded — drop a practice course.</div>
        </div>
      </div>
      <div class="card grow" id="chat">
        <h2>Navigator chat</h2>
        <div id="log"></div>
        <div class="quick">
          <button onclick="ask('Any active alerts?')">Alerts</button>
          <button onclick="ask('How is the driver doing?')">Helm</button>
          <button onclick="ask('What sail should we have up?')">Sail</button>
          <button onclick="ask('Any AIS traffic?')">AIS</button>
          <button onclick="ask('What % of polar are we sailing?')">Polar%</button>
          <button onclick="ask('How are we doing vs the polar over the session, and where are we leaving speed on the table?')">Polar trend</button>
          <button onclick="runDebrief()">Debrief</button>
        </div>
        <div class="composer">
          <input id="input" placeholder="Ask the navigator…" autocomplete="off"
                 onkeydown="if(event.key==='Enter')send()" />
          <button onclick="send()">↑</button>
        </div>
      </div>
    </div>
  </div>

  <!-- all-channels slide-over (multi-source cross-check view) -->
  <div class="scrim" id="scrim" onclick="closeChannels()"></div>
  <aside class="sheet" id="channels">
    <header>
      <h2>All channels — every source</h2>
      <button class="iconbtn" onclick="closeChannels()">Close</button>
    </header>
    <div class="body" id="channelsBody">
      <div class="placeholder">Loading…</div>
    </div>
  </aside>

<script src="/sun.js"></script>
<script src="/app.js"></script>
<script src="/sail.js"></script>
<script src="/plot.js"></script>
</body>
</html>
