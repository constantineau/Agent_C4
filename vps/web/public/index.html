<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>SR33 Navigator</title>
<style>
  :root {
    --bg: #0a0e14; --panel: #121821; --line: #1f2a37; --text: #cdd6e0;
    --muted: #7d8da0; --accent: #5db0ff; --ok: #36d399; --warn: #ffcf5a; --bad: #ff6b6b;
  }
  /* True night mode: red-on-black for night vision. */
  body.night { --bg:#0a0000; --panel:#160000; --line:#3a0000; --text:#ff4444;
               --muted:#8a1a1a; --accent:#ff4444; --ok:#ff4444; --warn:#ff4444; --bad:#ff6b6b; }
  * { box-sizing: border-box; }
  html, body { margin:0; height:100%; }
  body { background:var(--bg); color:var(--text); font:16px/1.45 system-ui, sans-serif;
         display:flex; flex-direction:column; }
  header { background:var(--panel); border-bottom:1px solid var(--line); padding:8px 10px; }
  .titlebar { display:flex; align-items:center; gap:8px; }
  .titlebar h1 { font-size:15px; margin:0; flex:1; letter-spacing:.5px; }
  .nightbtn { background:none; border:1px solid var(--line); color:var(--muted);
              border-radius:6px; padding:4px 8px; font-size:12px; }
  /* Live instrument strip pinned in header. */
  .strip { display:flex; gap:6px; margin-top:8px; overflow-x:auto; }
  .cell { flex:1 0 auto; min-width:64px; background:var(--bg); border:1px solid var(--line);
          border-radius:8px; padding:6px 8px; text-align:center; }
  .cell .lbl { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
  .cell .val { font-size:18px; font-weight:600; }
  #freshness { font-size:11px; color:var(--muted); margin-top:4px; text-align:right; }
  #freshness.stale { color:var(--warn); }
  /* Chat log. */
  #log { flex:1; overflow-y:auto; padding:10px; display:flex; flex-direction:column; gap:8px; }
  .msg { max-width:85%; padding:8px 11px; border-radius:12px; white-space:pre-wrap; }
  .msg.user { align-self:flex-end; background:var(--accent); color:#04121f; }
  .msg.assistant { align-self:flex-start; background:var(--panel); border:1px solid var(--line); }
  .msg.system { align-self:center; color:var(--muted); font-size:12px; background:none; }
  /* Quick actions. */
  .quick { display:flex; gap:6px; overflow-x:auto; padding:8px 10px 0; }
  .quick button { flex:0 0 auto; background:var(--panel); color:var(--text);
                  border:1px solid var(--line); border-radius:16px; padding:7px 12px; font-size:13px; }
  /* Composer. */
  .composer { display:flex; gap:6px; padding:10px; border-top:1px solid var(--line); background:var(--panel); }
  .composer input { flex:1; background:var(--bg); color:var(--text); border:1px solid var(--line);
                    border-radius:20px; padding:11px 14px; font-size:16px; }
  .composer button { background:var(--accent); color:#04121f; border:none; border-radius:20px;
                     padding:0 16px; font-weight:600; }
  /* Login gate. */
  #gate { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column;
          align-items:center; justify-content:center; gap:12px; padding:20px; z-index:10; }
  #gate input { background:var(--panel); color:var(--text); border:1px solid var(--line);
                border-radius:8px; padding:12px; font-size:16px; width:min(320px,90vw); }
  #gate button { background:var(--accent); color:#04121f; border:none; border-radius:8px;
                 padding:12px 20px; font-weight:600; }
  .hint { color:var(--muted); font-size:12px; max-width:320px; text-align:center; }
</style>
</head>
<body>
  <div id="gate">
    <h1 style="letter-spacing:1px;">SR33 NAVIGATOR</h1>
    <input id="pw" type="password" placeholder="Boat password" autocomplete="current-password" />
    <button onclick="unlock()">Enter</button>
    <div class="hint">Phase 0 stub: this gate is client-side only. Real shared-password
      auth (TLS, server-side) lands in Phase 5.</div>
  </div>

  <header>
    <div class="titlebar">
      <h1>SR33 NAVIGATOR</h1>
      <button class="nightbtn" onclick="toggleNight()">night</button>
    </div>
    <div class="strip" id="strip">
      <div class="cell"><div class="lbl">STW</div><div class="val" id="m-stw">–</div></div>
      <div class="cell"><div class="lbl">TWA</div><div class="val" id="m-twa">–</div></div>
      <div class="cell"><div class="lbl">TWS</div><div class="val" id="m-tws">–</div></div>
      <div class="cell"><div class="lbl">Polar%</div><div class="val" id="m-polar">–</div></div>
    </div>
    <div id="freshness">no data</div>
  </header>

  <div class="quick">
    <button onclick="ask('What % of polar are we sailing?')">Polar %</button>
    <button onclick="ask('Wind trend last 20 minutes?')">Wind trend</button>
    <button onclick="ask('Any AIS traffic?')">AIS</button>
    <button onclick="ask('Distance and ETA to next mark?')">Next mark</button>
    <button onclick="ask('What is the current set and drift?')">Current</button>
  </div>

  <div id="log"></div>

  <div class="composer">
    <input id="input" placeholder="Ask the navigator…" autocomplete="off"
           onkeydown="if(event.key==='Enter')send()" />
    <button onclick="send()">↑</button>
  </div>

<script>
  let ws;
  function unlock() {
    // Phase 0: no real check; just reveal the app. Phase 5 adds server-side auth.
    document.getElementById('gate').style.display = 'none';
    connect();
    refreshStrip();
    setInterval(refreshStrip, 5000);
  }
  function toggleNight() { document.body.classList.toggle('night'); }

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/ws`);
    ws.onmessage = (e) => { const m = JSON.parse(e.data); addMsg(m.role, m.text); };
    ws.onclose = () => { addMsg('system', 'disconnected — reconnecting…'); setTimeout(connect, 2000); };
  }
  function addMsg(role, text) {
    const log = document.getElementById('log');
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.textContent = text;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
  }
  function send() {
    const inp = document.getElementById('input');
    const text = inp.value.trim();
    if (!text || !ws || ws.readyState !== 1) return;
    addMsg('user', text);
    ws.send(text);
    inp.value = '';
  }
  function ask(q) { addMsg('user', q); if (ws && ws.readyState === 1) ws.send(q); }

  async function refreshStrip() {
    try {
      const r = await fetch('/api/conditions');
      const c = await r.json();
      const f = document.getElementById('freshness');
      if (!c.available) { f.textContent = 'no telemetry'; return; }
      document.getElementById('m-stw').textContent = fmt(c.stw);
      document.getElementById('m-twa').textContent = fmt(c.twa) + '°';
      document.getElementById('m-tws').textContent = fmt(c.tws);
      f.textContent = `data age ${c.data_age_seconds}s`;
      f.className = c.stale ? 'stale' : '';
    } catch (e) { /* leave last values */ }
  }
  const fmt = (v) => (v === null || v === undefined) ? '–' : (Math.round(v * 10) / 10);
</script>
</body>
</html>
