# Bench override: feed Signal K with built-in sample NMEA 2000 data so the whole
# Pi -> cloud pipeline is testable with no boat and no recorded log.
#   docker compose -f compose.pi.yml -f compose.pi.sample.yml up
# Remove this override (and replay a real candump onto vcan0) once a boat log exists.
name: sr33-pi

services:
  signalk:
    entrypoint: /home/node/signalk/node_modules/.bin/signalk-server
    command: ["--sample-n2k-data"]
  console:
    environment:
      # bench: no Pi↔Orin cable here — reach the real Orin over Tailscale
      COPILOT_UPSTREAM: "http://100.70.110.72:8300/"
  archiver:
    environment:
      # bench: never prune — the replayed 2014-timestamped sample data would all be
      # "out of session and old" (wipe the bench volume by hand when it gets fat)
      ARCHIVE_RETAIN_DAYS: "0"
